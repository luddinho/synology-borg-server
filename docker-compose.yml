services:
  # Setup notes: see README.md (or README.de.md)
  sshd:
    build:
      context: ./context
      dockerfile: Dockerfile
    image: synology-borg-server:local
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - NET_ADMIN
      - SETUID
      - SETGID
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SYS_CHROOT
    tmpfs:
      - /run
      - /tmp
    ports:
      - "${SSH_HOST_PORT}:22" # Host SSH port : container SSH port
    environment:
      TZ: ${TZ}
      BORG_USER: ${BORG_USER}
      BORG_UID: ${BORG_UID}
      BORG_GID: ${BORG_GID}
      SSH_LOG_LEVEL: ${SSH_LOG_LEVEL:-VERBOSE}
      BLOCKLIST_ENABLED: ${BLOCKLIST_ENABLED:-false}
      BLOCKLIST_TYPE: ${BLOCKLIST_TYPE:-ssh}
      BLOCKLIST_TYPES: ${BLOCKLIST_TYPES:-}
      BLOCKLIST_URL: ${BLOCKLIST_URL:-}
      BLOCKLIST_CRON: ${BLOCKLIST_CRON:-*/10 * * * *}
      BLOCKLIST_TARGET_PORTS: ${BLOCKLIST_TARGET_PORTS:-22}
      BLOCKLIST_SET_NAME: ${BLOCKLIST_SET_NAME:-blocklist_de}
      BLOCKLIST_CHAIN_NAME: ${BLOCKLIST_CHAIN_NAME:-BLOCKLIST_INPUT}
    volumes:
      # Persist SSH host keys/config to keep server fingerprint stable
      - ${SSH_CONFIG_DIR}:/etc/ssh

      # Public keys allowed to connect (create this file on Synology first)
      - ${AUTHORIZED_KEYS_FILE}:/config/authorized_keys:ro

      # Borg repositories are stored here
      - ${BORG_REPOS_DIR}:/var/backup/borg
